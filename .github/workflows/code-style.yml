name: Code Style

on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  code-style:
    name: PHP-CS-Fixer (PSR-12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Runs on our minimum supported PHP version (8.3).
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, json
          coverage: none
          tools: composer:v2

      - name: Resolve Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          # No composer.lock in this repo by convention; cache key hashes composer.json.
          key: ${{ runner.os }}-composer-php8.3-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-php8.3-

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Check coding standards
        run: composer cs
