name: CodeQL

on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    # Weekly on Monday at 04:03 UTC.
    - cron: '3 4 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # PHP has no native CodeQL analyzer; this scans the GitHub Actions
        # workflow files themselves (the only CodeQL-supported surface here).
        language: ['actions']

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          category: '/language:${{ matrix.language }}'
