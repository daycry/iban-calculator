name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    # Daily at 03:17 UTC — catches breakage from upstream dependency releases
    # since this package intentionally has no composer.lock (see README).
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phpunit:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, json
          coverage: ${{ matrix.php == '8.4' && 'xdebug' || 'none' }}
          tools: composer:v2

      - name: Resolve Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          # No composer.lock in this repo by convention (library, `composer update` in CI),
          # so the cache key hashes composer.json instead.
          key: ${{ runner.os }}-composer-php${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Run test suite
        if: matrix.php != '8.4'
        run: composer test

      - name: Run test suite with coverage
        if: matrix.php == '8.4'
        run: vendor/bin/phpunit --coverage-clover build/logs/clover.xml

      - name: Upload coverage to Coveralls
        if: matrix.php == '8.4'
        continue-on-error: true
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: build/logs/clover.xml
          format: clover
